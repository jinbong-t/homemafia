import os
import re

# 1. HTML 파일들이 있는 폴더 경로 (스크립트와 같은 폴더인 경우 '.' 사용)
folder_path = '.' 

# 2. 폴더 내 모든 .html 파일 가져오기 (결과 파일인 combined.html은 제외)
html_files = [f for f in os.listdir(folder_path) if f.endswith('.html') and f != 'combined.html']
# 파일 이름 순서대로 정렬 (필요시 정렬 방식 변경 가능)
html_files.sort()

combined_body_content = ""

print("파일 병합 시작...")

for file_name in html_files:
    file_path = os.path.join(folder_path, file_name)
    with open(file_path, 'r', encoding='utf-8') as f:
        content = f.read()
        
        # <body>와 </body> 태그 사이의 내용만 추출
        body_match = re.search(r'<body[^>]*>(.*?)</body>', content, re.DOTALL | re.IGNORECASE)
        
        if body_match:
            inner_body = body_match.group(1)
            # 각 파일의 경계를 구분하기 위한 주석 추가
            combined_body_content += f"\n\n<!-- Start of {file_name} -->\n"
            combined_body_content += inner_body
            combined_body_content += f"\n<!-- End of {file_name} -->\n"
            print(f"✓ {file_name} 병합 완료")
        else:
            # body 태그가 없는 경우 파일 전체를 추가
            combined_body_content += f"\n\n<!-- Start of {file_name} (No Body Tag) -->\n"
            combined_body_content += content
            print(f"⚠ {file_name} (body 태그를 찾지 못해 전체 내용 병합)")

# 3. 하나의 완벽한 HTML 구조로 재조립
final_html = f"""<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combined HTML</title>
    <style>
        /* 필요 시 이곳에 공통 스타일(CSS)을 추가하세요 */
    </style>
</head>
<body>
{combined_body_content}
</body>
</html>
"""

# 4. 최종 파일 저장
output_path = os.path.join(folder_path, 'combined.html')
with open(output_path, 'w', encoding='utf-8') as f:
    f.write(final_html)

print("\n🎉 모든 파일이 'combined.html'로 합쳐졌습니다!")