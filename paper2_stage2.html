<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>STAGE 2 종이 추리 | WSA</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#0f1923;color:#fff;-webkit-font-smoothing:antialiased}
.bg{position:fixed;inset:0;z-index:0}
.bg img{width:100%;height:100%;object-fit:cover}
.bg::after{content:'';position:absolute;inset:0;background:rgba(4,14,8,.86)}
.page{position:relative;z-index:1;min-height:100vh}
.content{padding:40px 16px 60px;max-width:480px;margin:0 auto}

.s-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(52,211,153,.14);border:1px solid rgba(52,211,153,.28);border-radius:20px;padding:5px 14px;font-size:11px;letter-spacing:1.5px;color:#6ee7b7;margin-bottom:14px}
.s-title{font-size:clamp(20px,5vw,25px);font-weight:700;margin-bottom:5px}
.s-title span{color:#4ade80}
.s-sub{font-size:13px;color:rgba(255,255,255,.5);line-height:1.7;margin-bottom:18px}

/* 상태 바 */
.status-bar{display:flex;align-items:center;justify-content:space-between;background:rgba(4,14,8,.6);backdrop-filter:blur(14px);border:1px solid rgba(52,211,153,.15);border-radius:12px;padding:10px 14px;margin-bottom:14px}
.stat-item{text-align:center}
.stat-val{font-size:20px;font-weight:700;color:#4ade80}
.stat-label{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.5px;margin-top:1px}
.stat-divider{width:1px;height:28px;background:rgba(255,255,255,.1)}

/* 카드 그리드 */
.card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}

/* 카드 */
.card{aspect-ratio:3/4;cursor:pointer;perspective:600px;-webkit-tap-highlight-color:transparent}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1)}
.card.flipped .card-inner{transform:rotateY(180deg)}
.card.matched .card-inner{transform:rotateY(180deg)}

.card-face{position:absolute;inset:0;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden}

/* 뒷면 (물음표) */
.card-back{background:linear-gradient(145deg,rgba(20,50,35,.9),rgba(10,35,25,.95));border:1.5px solid rgba(52,211,153,.22);box-shadow:0 3px 12px rgba(0,0,0,.3)}
.card-back-icon{font-size:clamp(18px,5vw,24px);opacity:.5}

/* 앞면 */
.card-front{background:linear-gradient(145deg,rgba(15,40,28,.95),rgba(8,28,20,.98));border:1.5px solid rgba(52,211,153,.3);transform:rotateY(180deg);box-shadow:0 3px 12px rgba(0,0,0,.3)}
.card.matched .card-front{border-color:#4ade80;background:linear-gradient(145deg,rgba(20,80,45,.95),rgba(12,55,30,.98));box-shadow:0 0 14px rgba(74,222,128,.25)}

/* 이미지 카드 */
.card-front.img-card .card-emoji{font-size:clamp(24px,7vw,36px);margin-bottom:4px}
.card-front.img-card .card-name{display:none}

/* 이름 카드 */
.card-front.name-card .card-emoji{display:none}
.card-front.name-card .card-name{font-size:clamp(11px,3vw,13px);font-weight:700;color:#86efac;text-align:center;padding:0 4px;line-height:1.4;word-break:keep-all}

/* 맞췄을때 체크 */
.card.matched .card-front::after{content:'✓';position:absolute;top:4px;right:6px;font-size:11px;color:#4ade80;font-weight:700}

/* 리셋 버튼 */
.btn-reset{width:100%;padding:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:rgba(255,255,255,.5);font-size:13px;font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-reset:active{transform:scale(.97)}

/* 팝업 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
.overlay.show{display:flex;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.popup{background:linear-gradient(145deg,rgba(4,20,12,.97),rgba(2,14,8,.97));border-radius:22px;padding:30px 24px;max-width:310px;width:100%;text-align:center;border:1px solid rgba(74,222,128,.3)}
.pop-icon{font-size:52px;margin-bottom:12px;display:block;animation:bounce .6s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
.pop-title{font-size:19px;font-weight:700;color:#86efac;margin-bottom:6px}
.pop-sub{font-size:13px;color:rgba(255,255,255,.6);line-height:1.7;margin-bottom:20px}
.pop-sub strong{color:#fbbf24}
.btn-next{width:100%;padding:14px;background:linear-gradient(135deg,#4ade80,#22c55e);border:none;border-radius:14px;color:#0f1923;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 4px 18px rgba(74,222,128,.3)}
.btn-next:active{transform:scale(.97)}

/* 파티클 */
.particle{position:fixed;pointer-events:none;z-index:300;font-size:16px;animation:pfall linear forwards}
@keyframes pfall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(60vh) rotate(360deg);opacity:0}}

@media(min-width:500px){.card-grid{gap:10px}}
@media(min-width:600px){.content{padding:52px 24px 64px}}
</style>
</head>

// 8쌍 데이터 — 이미지(이모지) + 이름
var PAIRS = [
  {id:1, emoji:'☀️', name:'채광',    desc:'햇빛이 들어오는 정도'},
  {id:2, emoji:'💨', name:'통풍',    desc:'바람이 잘 통하는 구조'},
  {id:3, emoji:'🌡️', name:'온도',    desc:'쾌적한 실내 온기'},
  {id:4, emoji:'💧', name:'습도',    desc:'적정 수분 유지'},
  {id:5, emoji:'🍄', name:'곰팡이',  desc:'과습 시 발생'},
  {id:6, emoji:'🧭', name:'방향',    desc:'남향·북향·동향·서향'},
  {id:7, emoji:'🏢', name:'층수',    desc:'건물 내 위치'},
  {id:8, emoji:'🪟', name:'창문',    desc:'채광·통풍의 핵심'},
];

var flipped = [], matched = 0, tries = 0, locked = false;

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=a[i];a[i]=a[j];a[j]=t;
  }
  return a;
}

function initGame(){
  flipped=[]; matched=0; tries=0; locked=false;
  document.getElementById('matched-count').textContent='0';
  document.getElementById('try-count').textContent='0';
  document.getElementById('ov').classList.remove('show');

  // 카드 16장 생성 (이미지 카드 8 + 이름 카드 8)
  var cards=[];
  PAIRS.forEach(function(p){
    cards.push({pairId:p.id, type:'img', emoji:p.emoji, name:p.name});
    cards.push({pairId:p.id, type:'name', emoji:p.emoji, name:p.name});
  });
  cards=shuffle(cards);

  var grid=document.getElementById('card-grid');
  grid.innerHTML='';
  cards.forEach(function(c,i){
    var div=document.createElement('div');
    div.className='card';
    div.dataset.pair=c.pairId;
    div.dataset.type=c.type;
    div.dataset.idx=i;
    div.innerHTML=
      '<div class="card-inner">'+
        '<div class="card-face card-back"><div class="card-back-icon">🌿</div></div>'+
        '<div class="card-face card-front '+(c.type==='img'?'img-card':'name-card')+'">'+
          '<div class="card-emoji">'+c.emoji+'</div>'+
          '<div class="card-name">'+c.name+'</div>'+
        '</div>'+
      '</div>';
    div.addEventListener('click',function(){flipCard(this);});
    grid.appendChild(div);
  });
}

function flipCard(card){
  if(locked) return;
  if(card.classList.contains('flipped')) return;
  if(card.classList.contains('matched')) return;
  if(flipped.length>=2) return;

  card.classList.add('flipped');
  flipped.push(card);

  if(flipped.length===2){
    locked=true;
    tries++;
    document.getElementById('try-count').textContent=tries;
    checkMatch();
  }
}

function checkMatch(){
  var a=flipped[0], b=flipped[1];
  var sameId=a.dataset.pair===b.dataset.pair;
  var diffType=a.dataset.type!==b.dataset.type;

  if(sameId && diffType){
    // 정답!
    setTimeout(function(){
      a.classList.add('matched');
      b.classList.add('matched');
      matched++;
      document.getElementById('matched-count').textContent=matched;
      flipped=[];
      locked=false;
      if(matched===PAIRS.length) setTimeout(showClear, 600);
    },300);
  } else {
    // 오답 — 뒤집기
    setTimeout(function(){
      a.classList.remove('flipped');
      b.classList.remove('flipped');
      flipped=[];
      locked=false;
    },900);
  }
}

function showClear(){
  // 파티클
  var icons=['🏠','🌿','⭐','✨','💚'];
  for(var i=0;i<24;i++){
    (function(i){setTimeout(function(){
      var p=document.createElement('div');
      p.className='particle';
      p.textContent=icons[Math.floor(Math.random()*icons.length)];
      p.style.cssText='left:'+(5+Math.random()*90)+'vw;top:-20px;animation-duration:'+(1.8+Math.random()*1.5)+'s';
      document.body.appendChild(p);
      setTimeout(function(){p.remove();},3500);
    },i*80);})(i);
  }
  document.getElementById('pop-sub').innerHTML=
    tries+'번 시도로 모든 쌍을 맞췄다!<br><strong>주거 요소 마스터!</strong><br><br>다음 단계로 이동하라.';
  document.getElementById('ov').classList.add('show');
}

function goNext(){
  document.getElementById('ov').classList.remove('show');
  if(window.parent&&window.parent.gotoScreen)window.parent.gotoScreen('s-stage3');
}

// 시작
initGame();
</script>
</body></html>
